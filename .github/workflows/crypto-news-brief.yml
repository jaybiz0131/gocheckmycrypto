# Crypto Cronkite news brief: the scheduled ingest -> AI processing -> review queue job.
#
# Runs aggregate -> editor -> verifier -> writer -> digest twice a day (morning and US
# afternoon) and uploads the review queue as a workflow artifact for the human
# editor-in-chief to approve.
#
# FAIL-CLOSED and it NEVER PUBLISHES. It runs run.py (Stages 1-5) only; publish.py (Stage 6)
# is a separate, deliberate, human-approved step and is intentionally not invoked here. If any
# stage errors, run.py exits non-zero and this job goes red (flagging a human); nothing is
# pushed anywhere.
#
# The pipeline needs ANTHROPIC_API_KEY (repo secret) for the editor/verifier/writer calls, and
# optionally CRYPTOPANIC_TOKEN / WHALE_ALERT_API_KEY / X_BEARER_TOKEN to widen sourcing. If the
# key is not configured yet, the job runs the offline canary as a wiring smoke test and stops
# (green) instead of failing daily.
name: Crypto Cronkite daily brief

on:
  schedule:
    - cron: "40 7 * * *"    # morning brief, 07:40 UTC
    - cron: "40 16 * * *"   # afternoon brief, 16:40 UTC (crypto is a 24/7 market; one
                            # cycle a day left the desk stale by the US afternoon)
  workflow_dispatch: {}

concurrency:
  group: crypto-news-brief
  cancel-in-progress: false

permissions:
  contents: write   # autopilot commits auto-approved VERIFIED stories into site/content

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Offline canary (hard gate, blocks a mis-wired pipeline)
        run: python3 verify_pipeline.py canary

      - name: Detect whether the API key is configured
        id: key
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "have_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "have_key=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANTHROPIC_API_KEY not set; ran the offline canary only. Add the secret to enable the live daily brief."
          fi

      - name: Run the daily brief (live; Stages 1-5 only, never publishes)
        if: steps.key.outputs.have_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRYPTOPANIC_TOKEN: ${{ secrets.CRYPTOPANIC_TOKEN }}
          WHALE_ALERT_API_KEY: ${{ secrets.WHALE_ALERT_API_KEY }}
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: python3 run.py --mode live

      # FULL AUTO RELEASE (Jack's standing instruction, 2026-07-11): the adversarial verifier
      # is the gate. VERIFIED stories auto-publish; NEEDS-HUMAN-REVIEW stays queued for a
      # human take; REJECT never ships. The push below auto-deploys via Netlify.
      - name: Autopilot publish of VERIFIED stories
        if: steps.key.outputs.have_key == 'true'
        run: python3 autopilot.py

      # The Chart Master reads the same boards the deploy will publish: refresh the two
      # data desks first (fail-open, like the Netlify build does), then generate the read.
      # The read is committed (Netlify does not regenerate it at build time); flows/pulse
      # are NOT committed here because every Netlify build refreshes them itself.
      - name: Refresh the boards and generate the Chart Master's read
        if: steps.key.outputs.have_key == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 whale_flows.py || true
          python3 market_pulse.py || true
          python3 chartmaster.py

      - name: Commit and push published content (deploys the site)
        id: publish
        if: steps.key.outputs.have_key == 'true'
        run: |
          git config user.name "Jack Berno"
          git config user.email "bernoalpha@gmail.com"
          git add site/content site/data/chartmaster.json
          if git diff --cached --quiet; then
            echo "::notice::No new stories to publish (nothing VERIFIED or all already live)."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "brief: VERIFIED stories + Chart Master read $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # The Publicist moved to its own workflow (publicist.yml, 14:30 UTC) so posts land
      # in LinkedIn's US morning instead of the middle of the night.

      - name: Upload the review queue for human approval
        if: steps.key.outputs.have_key == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: crypto-review-queue
          path: |
            out/review_queue/
            out/approval_template.json
            out/run_report.json
          if-no-files-found: warn

      # The Whale Watch board refreshes at Netlify BUILD time (see netlify.toml), so a
      # rebuild keeps it current without committing data. Runs even if the brief failed:
      # board freshness is independent of the news pipeline. SKIPPED when the brief just
      # pushed stories -- that push already triggered a build, and a second one would only
      # burn Netlify build minutes (the free tier pools ~300/month across all sites).
      # No hook secret -> documented skip.
      - name: Refresh the website (Netlify build hook -> data desk update)
        if: always()
        env:
          HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}
          PUSHED: ${{ steps.publish.outputs.pushed }}
        run: |
          if [ "$PUSHED" = "true" ]; then
            echo "::notice::Stories were pushed; that deploy already refreshes the data desks. Skipping the hook ping."
          elif [ -n "$HOOK" ]; then
            curl -s -f -X POST -d '{}' "$HOOK" > /dev/null \
              && echo "::notice::Triggered a Netlify rebuild (data desk refresh)." \
              || echo "::warning::Netlify build hook ping failed; the desks will refresh on the next deploy."
          else
            echo "::notice::NETLIFY_BUILD_HOOK not set; the board refreshes only on pushes. Add the secret to enable the daily refresh."
          fi
