# Netlify config for the Crypto Cronkite site (a SECOND Netlify site off this repo).
#
# The repo root netlify.toml belongs to GoCheckMyPet, so this site is configured with a
# BASE DIRECTORY of `crypto_pipeline/site` in the Netlify UI. Netlify then reads THIS file.
# The generator (site_build.py) computes its paths from its own location, so it always writes
# to crypto_pipeline/site/publish/ regardless of the working directory; `publish` below is
# that folder relative to this base.
#
# One-time setup: New site -> import this repo -> set Base directory = `crypto_pipeline/site`.
# Everything else (command, publish dir) comes from this file. See ../LAUNCH_CHECKLIST.md.
[build]
  base = "crypto_pipeline/site"
  command = "python3 ../site_build.py"
  publish = "publish"

# python3 is available in Netlify's default build image (the same image runs the pet site's
# build.sh, which also calls python3). Pin a version here only if the default ever changes.
[build.environment]
  PYTHON_VERSION = "3.12"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
